services:
  postgres:
    image: postgres:16
    container_name: bookstore_postgres
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: bookstore_user
      POSTGRES_PASSWORD: bookstore_pass
    ports:
      - "5433:5432"
    volumes:
      - bookstore_data:/var/lib/postgresql/data

volumes:
  bookstore_data: